<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Life of Logos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        body {
            background-color: #e5e5e5;
            background-image: url("https://www.transparenttextures.com/patterns/concrete-wall.png");
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
        }
        @media (min-width: 768px) and (pointer: fine) {
            body { cursor: none; }
        }
        .marker-font { font-family: 'Permanent Marker', cursive; }
        .inter-black { font-family: 'Inter', sans-serif; font-weight: 900; }
        .splatter { position: fixed; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.3; pointer-events: none; }
        #custom-cursor { display: none !important; width: 24px; height: 24px; background: #ff00ff; border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; mix-blend-mode: difference; transition: transform 0.15s ease-out; box-shadow: 0 0 15px #ff00ff; }
        @media (min-width: 768px) and (pointer: fine) {
            #custom-cursor { display: block !important; }
        }
        .form-card { border: 4px solid black; background: white; box-shadow: 12px 12px 0 rgba(255, 0, 255, 0.5); }
        .linkedin-btn:hover { transform: scale(1.05) rotate(-2deg); }
        .lol-form-field {
            width: 100%;
            border: 4px solid black;
            padding: 0.85rem 1rem;
            margin-bottom: 1.25rem;
            font-size: 1rem;
            outline: none;
        }
        .lol-form-field:focus { box-shadow: 0 0 0 4px rgba(255, 0, 255, 0.35); }
        .lol-form-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 0.35rem;
        }
        .form-submit {
            width: 100%;
            background: #000;
            color: #fff;
            padding: 1rem 2.5rem;
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
            font-style: italic;
            border: 4px solid black;
            box-shadow: 6px 6px 0 #ff00ff;
            cursor: pointer;
            transition: background 0.2s;
        }
        .form-submit:hover:not(:disabled) { background: #ff00ff; }
        .form-submit:disabled { opacity: 0.7; cursor: wait; }
    </style>
    <link rel="stylesheet" href="css/lol-enhance.css">
</head>
<body class="p-6 md:p-16 pb-40">
    <div id="custom-cursor"></div>
    <div class="splatter bg-fuchsia-500 w-[500px] h-[500px] -top-24 -right-20"></div>
    <div class="splatter bg-yellow-400 w-[400px] h-[400px] bottom-0 left-0"></div>

    <a href="index.html" class="inline-block mb-12 bg-black text-white px-6 py-3 marker-font rotate-[-2deg] hover:bg-fuchsia-600 transition-colors border-2 border-fuchsia-500 shadow-[6px_6px_0px_#ff00ff]">← BACK</a>

    <header class="mb-16">
        <h1 class="inter-black text-[10vw] md:text-[6vw] leading-none uppercase italic text-black">
            Get in <span class="marker-font lowercase block -mt-2 md:-mt-4 rotate-[-2deg] text-fuchsia-600">Touch</span>
        </h1>
        <p class="text-gray-700 mt-4 max-w-xl text-lg font-medium">Logo, print, or website — tell me what you're building. I reply from <strong>ryleyjohnsonemail@gmail.com</strong>.</p>
        <p class="mt-3 text-sm font-bold text-fuchsia-700">
            <a href="website-services.html" class="hover:underline">Stuck on Weebly or Wix? See website revamps →</a>
        </p>
    </header>

    <div class="max-w-2xl mb-12">
        <a href="https://www.linkedin.com/in/ryleyj/" target="_blank" rel="noopener noreferrer" class="linkedin-btn inline-flex items-center gap-4 form-card p-6 transition-transform w-full sm:w-auto">
            <span class="flex-shrink-0 w-12 h-12">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#0A66C2" class="w-full h-full"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
            </span>
            <span class="inter-black text-lg uppercase italic text-black">LinkedIn</span>
        </a>
    </div>

    <div class="max-w-2xl">
        <p class="marker-font text-fuchsia-600 uppercase tracking-widest text-sm mb-4">Send a message</p>
        <form id="contact-form" class="form-card p-8 md:p-10 rotate-[0.5deg]">
            <label class="lol-form-label" for="name">Name</label>
            <input type="text" id="name" name="name" required class="lol-form-field" placeholder="Your name" autocomplete="name">

            <label class="lol-form-label" for="email">Email</label>
            <input type="email" id="email" name="email" required class="lol-form-field" placeholder="you@email.com" autocomplete="email">

            <label class="lol-form-label" for="phone">Phone <span class="font-normal text-gray-500">(optional)</span></label>
            <input type="tel" id="phone" name="phone" class="lol-form-field" placeholder="(555) 123-4567" autocomplete="tel">

            <label class="lol-form-label" for="message">What's the project?</label>
            <textarea id="message" name="message" required rows="6" class="lol-form-field resize-y" placeholder="Logo, business cards, website revamp, platform escape — whatever you've got in mind…"></textarea>

            <button type="submit" class="form-submit w-full md:w-auto">Send message →</button>
        </form>
    </div>

    <footer class="fixed bottom-0 left-0 w-full bg-yellow-400 border-t-8 border-black z-[100] p-4 flex flex-wrap justify-center gap-6 md:gap-12">
        <a href="index.html" class="inter-black text-lg md:text-xl hover:text-fuchsia-600 uppercase italic">Home</a>
        <a href="about.html" class="inter-black text-lg md:text-xl hover:text-fuchsia-600 uppercase italic">About Me</a>
        <a href="https://www.redbubble.com/people/SoftwareSticker" target="_blank" rel="noopener noreferrer" class="inter-black text-lg md:text-xl hover:text-fuchsia-600 uppercase italic">Software Stickers</a>
        <a href="contact.html" class="inter-black text-lg md:text-xl hover:text-fuchsia-600 uppercase italic">Contact Me</a>
    </footer>

    <script>
        window.lolContactFormConfig = { sourceLabel: 'Life of Logos contact page' };
    </script>
    <script src="js/contact-form.js" defer></script>
    <script>
        (function() {
            if (!window.matchMedia('(min-width: 768px)').matches || !window.matchMedia('(pointer: fine)').matches) return;
            var cursor = document.getElementById('custom-cursor');
            document.addEventListener('mousemove', function(e) { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; });
            document.querySelectorAll('a, button, input, textarea').forEach(function(el) {
                el.addEventListener('mouseenter', function() { cursor.style.transform = 'scale(3)'; cursor.style.backgroundColor = '#00ffff'; });
                el.addEventListener('mouseleave', function() { cursor.style.transform = 'scale(1)'; cursor.style.backgroundColor = '#ff00ff'; });
            });
        })();
    </script>
    <script src="js/lol-enhance.js" defer></script>
</body>
</html>
